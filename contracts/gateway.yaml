openapi: 3.1.0
info:
  title: CivicLens Gateway API (M4)
  version: 1.0.0
paths:
  /health:
    get:
      summary: Zwraca status wszystkich modułów
      responses:
        '200':
          description: Sukces
          content:
            application/json:
              example:
                gateway: "ok"
                m1_data: "ok"
                m2_ai: "ok"
  /api/qa:
    post:
      summary: Zadaj pytanie o ustawę (Proxy do M2)
      requestBody:
        required: true
        content:
          application/json:
            example:
              act_id: "123-abc"
              question: "Jakie są kary?"
      responses:
        '200':
          description: Odpowiedź od LLM (z M2)
          content:
            application/json:
              example:
                data:
                  answer: "Kary wynoszą do 5000 zł."
                  citations: ["Art. 4"]
        '502':
          description: Błąd - Moduł AI nie odpowiada (Twoja rola!)
          content:
            application/json:
              example:
                error:
                  code: "UPSTREAM_ERROR"
                  message: "Moduł AI jest tymczasowo niedostępny."