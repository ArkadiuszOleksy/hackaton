version: '3.8'

services:
  # M4 — Twój Gateway (Brama wejściowa dla frontendu)
  gateway-service:
    build:
      context: ../services/gateway-service
    ports:
      - "8000:8000"
    environment:
      - M1_URL=http://data-service:8001
      - M2_URL=http://ai-service:8002
    depends_on:
      - data-service
      - ai-service

  # M1 — Moduł Danych (Integracja Sejmu i baza danych)
  data-service:
    build:
      context: ../services/data-service
    ports:
      - "8001:8001"
    environment:
      # Używamy nazwy 'postgres' jako hosta, aby uniknąć błędów OperationalError
      - DATABASE_URL=postgresql+psycopg://user:pass@postgres:5432/civiclens
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - postgres
      - redis

  # M2 — Moduł AI (LLM, RAG i analizy)
  ai-service:
    build:
      context: ../services/ai-service
    ports:
      - "8002:8002"
    environment:
      - DATA_SERVICE_URL=http://data-service:8001
      - REDIS_URL=redis://redis:6379/1
    # ai-service często wymaga pliku .env z kluczem OpenRouter
    env_file:
      - ../services/ai-service/.env
    depends_on:
      - redis

  # M3 — Aplikacja Webowa (Frontend)
# web-app:
 #   build:
  #    context: ../apps/web
   # ports:
    #  - "3000:3000"
   # environment:
   #   # Browser uderza do localhost, bo Gateway jest wystawiony na zewnątrz
    #  - NEXT_PUBLIC_API_URL=http://localhost:8000/api
   # depends_on:
    #  - gateway-service

  # --- WSPÓŁDZIELONA INFRASTRUKTURA ---

  # Zmieniono nazwę na 'postgres', aby pasowała do konfiguracji M1
  postgres:
    image: ankane/pgvector:latest
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass
      - POSTGRES_DB=civiclens
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data: