openapi: 3.1.0
info:
  title: CivicLens Gateway API (M4)
  version: 1.0.0
  description: Główny punkt wejścia dla aplikacji webowej (M3).

servers:
  - url: http://localhost:8000
    description: Lokalny Gateway

paths:
  /health:
    get:
      summary: Agregacja statusów zdrowia
      responses:
        '200':
          [cite_start]description: Status wszystkich usług [cite: 67, 71]

  /api/legal-acts:
    get:
      [cite_start]summary: Pobieranie listy aktów prawnych (Proxy do M1) [cite: 71]
      responses:
        '200':
          [cite_start]description: Lista aktów w formacie Uniform Response [cite: 83]

  /api/legal-acts/{id}:
    get:
      [cite_start]summary: Szczegóły aktu prawnego (Proxy do M1) [cite: 71, 99]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          [cite_start]description: Szczegóły aktu [cite: 100]

  /api/qa:
    post:
      [cite_start]summary: Pytanie Q&A o ustawę (Proxy do M2) [cite: 71, 92]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                act_id: {type: string}
                question: {type: string}
                [cite_start]top_k: {type: integer, default: 5} [cite: 93]
      responses:
        '200':
          [cite_start]description: Odpowiedź AI z cytatami [cite: 93, 94]

  /api/analyze/impact:
    post:
      [cite_start]summary: Analiza korzyści i strat (Proxy do M2) [cite: 43, 72, 96]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                [cite_start]act_id: {type: string} [cite: 97]
      responses:
        '200':
          [cite_start]description: Analiza interesariuszy [cite: 97, 98]

  /api/analyze/patent-check:
    post:
      [cite_start]summary: Sprawdzenie podobieństwa do patentów (Fan-out: M2 + M1) [cite: 72]
      responses:
        '200':
          [cite_start]description: Wynik analizy patentowej [cite: 43]

components:
  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code: {type: string}
            message: {type: string}
            [cite_start]request_id: {type: string} [cite: 88]