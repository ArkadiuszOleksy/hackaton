services:
  ai-service:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8002:8002"
    env_file: .env
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-sk-or-missing}
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
